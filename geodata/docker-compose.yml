version: "3.9"

# Local dev stack — use Colima as container runtime (not Docker Desktop)
# brew install colima docker docker-compose && colima start --cpu 4 --memory 8

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: geodata
      POSTGRES_USER: geodata
      POSTGRES_PASSWORD: geodata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geodata"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://geodata:geodata@db:5432/geodata
      REDIS_URL: redis://redis:6379/0
      TILES_DIR: /tiles
    volumes:
      - tiles:/tiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./api/src
          target: /app/src

  worker:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    command: uv run celery -A pipeline.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://geodata:geodata@db:5432/geodata
      REDIS_URL: redis://redis:6379/0
      TILES_DIR: /tiles
    volumes:
      - tiles:/tiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    command: uv run celery -A pipeline.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      DATABASE_URL: postgresql://geodata:geodata@db:5432/geodata
      REDIS_URL: redis://redis:6379/0
      TILES_DIR: /tiles
    volumes:
      - tiles:/tiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  tiles:
